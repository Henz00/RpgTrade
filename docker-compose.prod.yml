services:
  postgres:
    image: postgres:17
    container_name: rpgtrade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - rpgtrade_postgres_data:/var/lib/postgresql/data
    networks:
      - rpgtrade-network

  api:
    build:
      context: .
      dockerfile: RpgTrade.Api/Dockerfile
    container_name: rpgtrade-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${API_CONNECTION_STRING}
    depends_on:
      - postgres
    networks:
      - rpgtrade-network

  web:
    build:
      context: .
      dockerfile: RpgTrade.Web/Dockerfile
    container_name: rpgtrade-web
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ApiBaseUrl: ${WEB_API_BASE_URL}
    depends_on:
      - api
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - rpgtrade-network

volumes:
  rpgtrade_postgres_data:

networks:
  rpgtrade-network: